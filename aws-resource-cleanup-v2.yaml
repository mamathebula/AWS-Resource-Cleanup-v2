AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Resource Cleanup v2 - Automated cleanup with cost savings tracking and potential savings scanner'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Cleanup Configuration"
        Parameters:
          - MinRunningTimeHours
          - NotificationTimeHours
          - ExcludeString
      - Label:
          default: "Notification Configuration"
        Parameters:
          - NotificationEmail
      - Label:
          default: "Scheduling Configuration"
        Parameters:
          - ScheduleExpression
          - LambdaTimeout

Parameters:
  MinRunningTimeHours:
    Type: Number
    Default: 8
    Description: Minimum hours before deletion (applies to CloudFormation stacks, EC2 instances, and S3 buckets)
    MinValue: 1
    MaxValue: 168
  NotificationTimeHours:
    Type: Number
    Default: 4
    Description: Hours before deletion to send notification
    MinValue: 1
    MaxValue: 24
  ExcludeString:
    Type: String
    Default: 'do-not-delete'
    Description: Resources containing this string in name/tags will be protected
  NotificationEmail:
    Type: String
    Description: Email address for deletion notifications
  ScheduleExpression:
    Type: String
    Default: 'rate(2 hours)'
    Description: How often to run the cleanup
  LambdaTimeout:
    Type: Number
    Default: 900
    Description: Lambda function timeout in seconds
    MinValue: 60
    MaxValue: 900

Resources:
  CleanupNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-Notifications'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
        - Key: ManagedBy
          Value: CloudFormation
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-${AWS::Region}-LambdaRole'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ResourceCleanupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:DeleteVolume
                  - ec2:DeleteSnapshot
                  - ec2:ReleaseAddress
                  - ec2:TerminateInstances
                  - ec2:StopInstances
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateTerminationProtection
                  - cloudformation:ListStacks
                  - cloudformation:UpdateStack
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:ListAllMyBuckets
                  - s3:GetBucketTagging
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource:
                  - 'arn:aws:s3:::*'
                  - 'arn:aws:s3:::*/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref CleanupNotificationTopic
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:DeleteLogGroup
                Resource: '*'
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:RemovePermission
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                Resource: '*'
              - Effect: Allow
                Action:
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:ListInstanceProfilesForRole
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:DeleteInstanceProfile
                Resource: '*'
              - Effect: Allow
                Action:
                  - apigateway:DELETE
                  - apigateway:GET
                Resource: '*'
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:DeleteDBInstance
                  - rds:DeleteDBCluster
                  - rds:DescribeDBClusters
                Resource: '*'
              - Effect: Allow
                Action:
                  - elasticloadbalancing:Describe*
                  - elasticloadbalancing:Delete*
                Resource: '*'
              - Effect: Allow
                Action:
                  - autoscaling:Describe*
                  - autoscaling:Delete*
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:Describe*
                  - ecs:List*
                  - ecs:Delete*
                  - ecs:DeregisterTaskDefinition
                Resource: '*'
              - Effect: Allow
                Action:
                  - eks:DeleteCluster
                  - ecr:DeleteRepository
                  - sqs:DeleteQueue
                  - states:DeleteStateMachine
                  - ses:Delete*
                  - secretsmanager:DeleteSecret
                  - secretsmanager:ListSecrets
                  - secretsmanager:DescribeSecret
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudfront:*
                  - route53:*
                  - elasticache:*
                  - elasticfilesystem:*
                  - kafka:*
                  - kms:Describe*
                  - kms:List*
                  - kms:ScheduleKeyDeletion
                  - kms:DeleteAlias
                  - ssm:*
                  - imagebuilder:*
                Resource: '*'

  ResourceCleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-CleanupFunction'
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: 512
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
      Environment:
        Variables:
          MIN_RUNNING_TIME_HOURS: !Ref MinRunningTimeHours
          NOTIFICATION_TIME_HOURS: !Ref NotificationTimeHours
          SNS_TOPIC_ARN: !Ref CleanupNotificationTopic
          EXCLUDE_STRING: !Ref ExcludeString
          FORCE_DELETE: 'True'
      Code:
        ZipFile: |
          import boto3
          import datetime
          import time
          import os
          from botocore.exceptions import ClientError
          import json

          ec2 = boto3.client('ec2')
          cf = boto3.client('cloudformation')
          sns = boto3.client('sns')
          cw = boto3.client('cloudwatch')

          MIN_HOURS = int(os.environ.get('MIN_RUNNING_TIME_HOURS', 8))
          NOTIFY_HOURS = int(os.environ.get('NOTIFICATION_TIME_HOURS', 4))
          SNS_ARN = os.environ.get('SNS_TOPIC_ARN')
          EXCLUDE = os.environ.get('EXCLUDE_STRING', 'do-not-delete')
          FORCE = os.environ.get('FORCE_DELETE', 'false').lower() == 'true'

          INSTANCE_PRICES = {
              't2.micro': 8.35, 't2.small': 16.70, 't2.medium': 33.41,
              't3.micro': 7.49, 't3.small': 14.98, 't3.medium': 29.95,
              't3.large': 59.90, 't3.xlarge': 119.81,
              'm5.large': 69.12, 'm5.xlarge': 138.24, 'm5.2xlarge': 276.48,
              'm6i.large': 69.12, 'm6i.xlarge': 138.24,
              'c5.large': 61.20, 'c5.xlarge': 122.40,
              'r5.large': 90.72, 'r5.xlarge': 181.44
          }
          VOLUME_PRICES = {'gp2': 0.10, 'gp3': 0.08, 'io1': 0.125, 'io2': 0.125, 'st1': 0.045, 'sc1': 0.025, 'standard': 0.05}

          def metric(name, value, dims=None):
              try:
                  d = {'MetricName': name, 'Value': value, 'Unit': 'Count', 'Timestamp': datetime.datetime.now()}
                  if dims: d['Dimensions'] = dims
                  cw.put_metric_data(Namespace='ResourceCleaner', MetricData=[d])
              except: pass

          def is_protected(tags):
              return any(EXCLUDE.lower() in tag.get('Value', '').lower() for tag in (tags or []))

          def get_name(tags):
              for tag in (tags or []):
                  if tag['Key'] == 'Name': return tag['Value']
              return 'N/A'

          def empty_bucket(name):
              s3 = boto3.client('s3')
              try:
                  for page in s3.get_paginator('list_object_versions').paginate(Bucket=name):
                      objs = [{'Key': v['Key'], 'VersionId': v['VersionId']} for v in page.get('Versions', [])]
                      objs += [{'Key': m['Key'], 'VersionId': m['VersionId']} for m in page.get('DeleteMarkers', [])]
                      if objs: s3.delete_objects(Bucket=name, Delete={'Objects': objs})
              except: pass

          def cleanup_instances():
              terminated, protected, savings = 0, 0, 0.0
              try:
                  resp = ec2.describe_instances(Filters=[{'Name': 'instance-state-name', 'Values': ['pending','running','stopping','stopped']}])
                  now = datetime.datetime.utcnow()
                  for r in resp['Reservations']:
                      for i in r['Instances']:
                          iid, name = i['InstanceId'], get_name(i.get('Tags'))
                          if is_protected(i.get('Tags')):
                              protected += 1; continue
                          age = now - i['LaunchTime'].replace(tzinfo=None)
                          if FORCE or age >= datetime.timedelta(hours=MIN_HOURS):
                              try:
                                  ec2.terminate_instances(InstanceIds=[iid])
                                  terminated += 1
                                  savings += INSTANCE_PRICES.get(i.get('InstanceType',''), 30.0)
                                  print(f"Terminated: {iid} ({name})")
                              except ClientError as e:
                                  print(f"Error terminating {iid}: {e}")
                                  metric('FailedDeletions', 1, [{'Name':'ResourceType','Value':'EC2Instance'}])
              except ClientError as e: print(f"Error: {e}")
              metric('TerminatedInstances', terminated)
              metric('ProtectedInstances', protected)
              metric('CostSavings', savings, [{'Name':'ResourceType','Value':'EC2Instance'}])
              return terminated, savings

          def cleanup_volumes():
              deleted, protected, savings = 0, 0, 0.0
              for page in ec2.get_paginator('describe_volumes').paginate(Filters=[{'Name':'status','Values':['available']}]):
                  for v in page['Volumes']:
                      vid = v['VolumeId']
                      if is_protected(v.get('Tags')): protected += 1; continue
                      try:
                          ec2.delete_volume(VolumeId=vid); deleted += 1
                          savings += VOLUME_PRICES.get(v['VolumeType'], 0.10) * v['Size']
                          print(f"Deleted volume: {vid}")
                      except ClientError as e:
                          print(f"Error deleting {vid}: {e}")
                          metric('FailedDeletions', 1, [{'Name':'ResourceType','Value':'Volume'}])
              metric('DeletedVolumes', deleted)
              metric('ProtectedVolumes', protected)
              metric('CostSavings', savings, [{'Name':'ResourceType','Value':'Volume'}])
              return deleted, savings

          def cleanup_snapshots():
              deleted, protected, savings = 0, 0, 0.0
              acct = boto3.client('sts').get_caller_identity()['Account']
              for page in ec2.get_paginator('describe_snapshots').paginate(OwnerIds=[acct]):
                  for s in page['Snapshots']:
                      sid = s['SnapshotId']
                      if is_protected(s.get('Tags')): protected += 1; continue
                      age = datetime.datetime.now(datetime.timezone.utc) - s['StartTime']
                      if age > datetime.timedelta(days=7):
                          amis = ec2.describe_images(Filters=[{'Name':'block-device-mapping.snapshot-id','Values':[sid]}])
                          if amis['Images']: continue
                          try:
                              ec2.delete_snapshot(SnapshotId=sid); deleted += 1
                              savings += s.get('VolumeSize', 1) * 0.05
                              print(f"Deleted snapshot: {sid}")
                          except ClientError as e:
                              print(f"Error deleting {sid}: {e}")
                              metric('FailedDeletions', 1, [{'Name':'ResourceType','Value':'Snapshot'}])
              metric('DeletedSnapshots', deleted)
              metric('CostSavings', savings, [{'Name':'ResourceType','Value':'Snapshot'}])
              return deleted, savings

          def cleanup_eips():
              released, protected, savings = 0, 0, 0.0
              try:
                  for eip in ec2.describe_addresses()['Addresses']:
                      aid = eip.get('AllocationId')
                      if not aid: continue
                      if is_protected(eip.get('Tags')): protected += 1; continue
                      if 'InstanceId' not in eip:
                          try:
                              ec2.release_address(AllocationId=aid); released += 1; savings += 3.65
                              print(f"Released EIP: {eip.get('PublicIp')}")
                          except ClientError as e:
                              print(f"Error releasing {aid}: {e}")
              except ClientError as e: print(f"Error: {e}")
              metric('ReleasedElasticIPs', released)
              metric('CostSavings', savings, [{'Name':'ResourceType','Value':'ElasticIP'}])
              return released, savings

          def cleanup_buckets():
              s3 = boto3.client('s3')
              deleted, protected = 0, 0
              try:
                  for b in s3.list_buckets()['Buckets']:
                      name = b['Name']
                      try:
                          tags = s3.get_bucket_tagging(Bucket=name).get('TagSet', [])
                          if is_protected(tags): protected += 1; continue
                      except: pass
                      age = datetime.datetime.now(datetime.timezone.utc) - b['CreationDate'].replace(tzinfo=datetime.timezone.utc)
                      if age >= datetime.timedelta(hours=MIN_HOURS):
                          try:
                              empty_bucket(name); s3.delete_bucket(Bucket=name); deleted += 1
                              print(f"Deleted bucket: {name}")
                          except ClientError as e: print(f"Error deleting {name}: {e}")
              except ClientError as e: print(f"Error: {e}")
              metric('DeletedS3Buckets', deleted)
              return deleted

          def force_delete_stack(name):
              """Force delete a stack: disable termination protection, empty S3 buckets, retry with retain on failure."""
              try:
                  # Disable termination protection
                  try:
                      cf.update_termination_protection(EnableTerminationProtection=False, StackName=name)
                      print(f"Disabled termination protection on: {name}")
                  except: pass
                  # Empty S3 buckets in the stack
                  try:
                      resp = cf.describe_stack_resources(StackName=name)
                      for r in resp['StackResources']:
                          if r['ResourceType'] == 'AWS::S3::Bucket':
                              empty_bucket(r['PhysicalResourceId'])
                  except: pass
                  # First delete attempt
                  cf.delete_stack(StackName=name)
                  print(f"Delete initiated: {name}")
                  # Wait briefly and check if it failed
                  time.sleep(5)
                  try:
                      status = cf.describe_stacks(StackName=name)['Stacks'][0]['StackStatus']
                      if status == 'DELETE_FAILED':
                          # Get resources that failed to delete
                          retain = []
                          try:
                              resources = cf.describe_stack_resources(StackName=name)['StackResources']
                              retain = [r['LogicalResourceId'] for r in resources if r['ResourceStatus'] in ['DELETE_FAILED','CREATE_COMPLETE','UPDATE_COMPLETE']]
                          except: pass
                          if retain:
                              print(f"Retrying {name} with RetainResources: {retain}")
                              cf.delete_stack(StackName=name, RetainResources=retain)
                          else:
                              cf.delete_stack(StackName=name)
                  except ClientError as e:
                      if 'does not exist' in str(e): pass  # Stack already deleted
                      else: raise
                  return True
              except ClientError as e:
                  print(f"Force delete failed for {name}: {e}")
                  return False

          def cleanup_stacks():
              deleted, protected, notified, failed = 0, 0, 0, 0
              now = datetime.datetime.utcnow()
              for stack in cf.describe_stacks()['Stacks']:
                  name = stack['StackName']
                  status = stack.get('StackStatus', '')
                  if any(k in name.lower() for k in ['cleanup','cleaner','resourcecleanup']):
                      protected += 1; continue
                  if EXCLUDE.lower() in name.lower():
                      protected += 1; continue
                  tags = {t['Key']:t['Value'] for t in stack.get('Tags',[])}
                  if any(EXCLUDE.lower() in v.lower() for v in tags.values()):
                      protected += 1; continue
                  # Handle already-failed stacks immediately
                  if status == 'DELETE_FAILED':
                      print(f"Found DELETE_FAILED stack: {name}, force deleting...")
                      if force_delete_stack(name): deleted += 1
                      else: failed += 1
                      continue
                  age = now - stack['CreationTime'].replace(tzinfo=None)
                  notify_start = datetime.timedelta(hours=MIN_HOURS - NOTIFY_HOURS)
                  delete_time = datetime.timedelta(hours=MIN_HOURS)
                  if notify_start <= age < delete_time:
                      if tags.get('CleanupWarningNotified') != 'true':
                          try:
                              remaining = delete_time - age
                              sns.publish(TopicArn=SNS_ARN, Subject=f'Stack Deletion Warning: {name}',
                                  Message=f'Stack "{name}" will be deleted in ~{remaining.total_seconds()//3600:.0f}h. Tag with Name={EXCLUDE} to protect.')
                              notified += 1
                          except: pass
                  if age >= delete_time:
                      if force_delete_stack(name): deleted += 1
                      else:
                          failed += 1
                          metric('FailedDeletions', 1, [{'Name':'ResourceType','Value':'Stack'}])
              metric('DeletedStacks', deleted)
              metric('ProtectedStacks', protected)
              metric('StackNotifications', notified)
              return deleted, protected, notified, failed

          def lambda_handler(event, context):
              if event.get('RequestType') or event.get('ResourceType','').startswith('Custom::'):
                  return {'Status':'SUCCESS','PhysicalResourceId':event.get('PhysicalResourceId','')}

              stacks_del, stacks_prot, notified, stack_fails = cleanup_stacks()
              inst_del, inst_savings = cleanup_instances()
              vol_del, vol_savings = cleanup_volumes()
              snap_del, snap_savings = cleanup_snapshots()
              eip_del, eip_savings = cleanup_eips()
              bucket_del = cleanup_buckets()

              total_savings = inst_savings + vol_savings + snap_savings + eip_savings
              metric('TotalMonthlySavings', total_savings)

              total_del = stacks_del + inst_del + vol_del + snap_del + eip_del + bucket_del
              if total_del > 0:
                  try:
                      region = os.environ.get('AWS_REGION','unknown')
                      msg = f"""AWS Resource Cleanup Summary
          Region: {region}
          Time: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}

          RESOURCES DELETED:
          - Stacks: {stacks_del}
          - EC2 Instances: {inst_del}
          - S3 Buckets: {bucket_del}
          - EBS Volumes: {vol_del}
          - Snapshots: {snap_del}
          - Elastic IPs: {eip_del}

          PROTECTED: {stacks_prot} stacks
          WARNINGS SENT: {notified}
          FAILED: {stack_fails}

          ESTIMATED MONTHLY SAVINGS:
          - EC2 Instances: ${inst_savings:.2f}
          - EBS Volumes: ${vol_savings:.2f}
          - Snapshots: ${snap_savings:.2f}
          - Elastic IPs: ${eip_savings:.2f}
          - Total: ${total_savings:.2f}/month

          Logs: /aws/lambda/{context.function_name}"""
                      sns.publish(TopicArn=SNS_ARN, Message=msg, Subject=f'[{region}] Cleanup: {total_del} deleted, ${total_savings:.2f}/mo saved')
                  except Exception as e: print(f"Notification error: {e}")

              return {'statusCode': 200, 'body': json.dumps({
                  'deleted': total_del, 'savings': round(total_savings, 2)
              })}

  # Potential Savings Scanner - scans without deleting
  PotentialSavingsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-SavingsScanner'
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 256
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
      Environment:
        Variables:
          EXCLUDE_STRING: !Ref ExcludeString
          SNS_TOPIC_ARN: !Ref CleanupNotificationTopic
      Code:
        ZipFile: |
          import boto3
          import datetime
          import os
          from botocore.exceptions import ClientError

          ec2 = boto3.client('ec2')
          cw = boto3.client('cloudwatch')
          sns = boto3.client('sns')
          EXCLUDE = os.environ.get('EXCLUDE_STRING', 'do-not-delete')
          SNS_ARN = os.environ.get('SNS_TOPIC_ARN')

          INSTANCE_PRICES = {
              't2.micro': 8.35, 't2.small': 16.70, 't2.medium': 33.41,
              't3.micro': 7.49, 't3.small': 14.98, 't3.medium': 29.95,
              't3.large': 59.90, 't3.xlarge': 119.81,
              'm5.large': 69.12, 'm5.xlarge': 138.24, 'm5.2xlarge': 276.48,
              'm6i.large': 69.12, 'm6i.xlarge': 138.24,
              'c5.large': 61.20, 'c5.xlarge': 122.40,
              'r5.large': 90.72, 'r5.xlarge': 181.44
          }
          VOLUME_PRICES = {'gp2': 0.10, 'gp3': 0.08, 'io1': 0.125, 'io2': 0.125, 'st1': 0.045, 'sc1': 0.025, 'standard': 0.05}

          def is_protected(tags):
              return any(EXCLUDE.lower() in t.get('Value','').lower() for t in (tags or []))

          def get_name(tags):
              for t in (tags or []):
                  if t['Key'] == 'Name': return t['Value']
              return 'N/A'

          def metric(name, value, dims=None):
              try:
                  d = {'MetricName': name, 'Value': value, 'Unit': 'Count', 'Timestamp': datetime.datetime.now()}
                  if dims: d['Dimensions'] = dims
                  cw.put_metric_data(Namespace='ResourceCleaner', MetricData=[d])
              except: pass

          def scan_instances():
              items, total = [], 0.0
              try:
                  resp = ec2.describe_instances(Filters=[{'Name':'instance-state-name','Values':['running','stopped']}])
                  for r in resp['Reservations']:
                      for i in r['Instances']:
                          if is_protected(i.get('Tags')): continue
                          cost = INSTANCE_PRICES.get(i.get('InstanceType',''), 30.0)
                          total += cost
                          items.append(f"  {i['InstanceId']} ({get_name(i.get('Tags'))}) - {i['InstanceType']} - ${cost:.2f}/mo")
              except: pass
              return items, total

          def scan_volumes():
              items, total = [], 0.0
              for page in ec2.get_paginator('describe_volumes').paginate(Filters=[{'Name':'status','Values':['available']}]):
                  for v in page['Volumes']:
                      if is_protected(v.get('Tags')): continue
                      cost = VOLUME_PRICES.get(v['VolumeType'], 0.10) * v['Size']
                      total += cost
                      items.append(f"  {v['VolumeId']} - {v['VolumeType']} {v['Size']}GB - ${cost:.2f}/mo")
              return items, total

          def scan_snapshots():
              items, total = [], 0.0
              acct = boto3.client('sts').get_caller_identity()['Account']
              for page in ec2.get_paginator('describe_snapshots').paginate(OwnerIds=[acct]):
                  for s in page['Snapshots']:
                      if is_protected(s.get('Tags')): continue
                      age = datetime.datetime.now(datetime.timezone.utc) - s['StartTime']
                      if age > datetime.timedelta(days=7):
                          cost = s.get('VolumeSize', 1) * 0.05
                          total += cost
                          items.append(f"  {s['SnapshotId']} - {s.get('VolumeSize',0)}GB - {age.days} days old - ${cost:.2f}/mo")
              return items, total

          def scan_eips():
              items, total = [], 0.0
              try:
                  for eip in ec2.describe_addresses()['Addresses']:
                      if is_protected(eip.get('Tags')): continue
                      if 'InstanceId' not in eip:
                          total += 3.65
                          items.append(f"  {eip.get('PublicIp','?')} ({eip.get('AllocationId','?')}) - $3.65/mo")
              except: pass
              return items, total

          def scan_stopped_instances():
              items, total = [], 0.0
              try:
                  resp = ec2.describe_instances(Filters=[{'Name':'instance-state-name','Values':['stopped']}])
                  for r in resp['Reservations']:
                      for i in r['Instances']:
                          if is_protected(i.get('Tags')): continue
                          # Stopped instances still cost for EBS volumes
                          items.append(f"  {i['InstanceId']} ({get_name(i.get('Tags'))}) - {i['InstanceType']} - stopped (EBS still billed)")
              except: pass
              return items, 0.0

          def lambda_handler(event, context):
              inst_items, inst_cost = scan_instances()
              vol_items, vol_cost = scan_volumes()
              snap_items, snap_cost = scan_snapshots()
              eip_items, eip_cost = scan_eips()
              stopped_items, _ = scan_stopped_instances()
              total = inst_cost + vol_cost + snap_cost + eip_cost

              metric('PotentialSavings', total)
              metric('PotentialSavings', inst_cost, [{'Name':'ResourceType','Value':'EC2Instance'}])
              metric('PotentialSavings', vol_cost, [{'Name':'ResourceType','Value':'Volume'}])
              metric('PotentialSavings', snap_cost, [{'Name':'ResourceType','Value':'Snapshot'}])
              metric('PotentialSavings', eip_cost, [{'Name':'ResourceType','Value':'ElasticIP'}])

              region = os.environ.get('AWS_REGION','unknown')
              lines = [f"Potential Savings Report - {region}",
                       f"Time: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}",
                       f"",
                       f"TOTAL POTENTIAL SAVINGS: ${total:.2f}/month",
                       f""]

              if inst_items:
                  lines.append(f"UNPROTECTED EC2 INSTANCES ({len(inst_items)}) - ${inst_cost:.2f}/mo:")
                  lines.extend(inst_items)
                  lines.append("")
              if stopped_items:
                  lines.append(f"STOPPED INSTANCES ({len(stopped_items)}) - still incurring EBS costs:")
                  lines.extend(stopped_items)
                  lines.append("")
              if vol_items:
                  lines.append(f"UNATTACHED VOLUMES ({len(vol_items)}) - ${vol_cost:.2f}/mo:")
                  lines.extend(vol_items)
                  lines.append("")
              if snap_items:
                  lines.append(f"OLD SNAPSHOTS >7 DAYS ({len(snap_items)}) - ${snap_cost:.2f}/mo:")
                  lines.extend(snap_items[:20])
                  if len(snap_items) > 20: lines.append(f"  ... and {len(snap_items)-20} more")
                  lines.append("")
              if eip_items:
                  lines.append(f"UNASSOCIATED ELASTIC IPs ({len(eip_items)}) - ${eip_cost:.2f}/mo:")
                  lines.extend(eip_items)
                  lines.append("")

              if total == 0:
                  lines.append("No potential savings found. Your account is clean.")

              msg = chr(10).join(lines)
              try:
                  sns.publish(TopicArn=SNS_ARN, Message=msg,
                      Subject=f'[{region}] Potential Savings: ${total:.2f}/month')
              except Exception as e: print(f"Error: {e}")

              return {'statusCode': 200, 'body': f'Potential savings: ${total:.2f}/month'}

  # Schedule for cleanup Lambda
  CleanupScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-CleanupSchedule'
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
      Targets:
        - Arn: !GetAtt ResourceCleanupFunction.Arn
          Id: CleanupTarget

  CleanupInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResourceCleanupFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CleanupScheduleRule.Arn

  # Schedule for savings scanner - runs daily
  SavingsScanSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-SavingsScanSchedule'
      ScheduleExpression: 'rate(1 day)'
      State: ENABLED
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${ExcludeString}'
      Targets:
        - Arn: !GetAtt PotentialSavingsFunction.Arn
          Id: SavingsScanTarget

  SavingsScanPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PotentialSavingsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SavingsScanSchedule.Arn

  # CloudWatch Dashboard
  CostDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-Dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text", "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {"markdown": "# AWS Cost Optimization Dashboard - ${AWS::Region}"}
            },
            {
              "type": "metric", "x": 0, "y": 1, "width": 8, "height": 6,
              "properties": {
                "metrics": [["ResourceCleaner","TotalMonthlySavings",{"stat":"Sum","label":"Actual Savings ($)"}]],
                "title": "Actual Monthly Savings ($)", "view": "singleValue", "region": "${AWS::Region}", "period": 2592000
              }
            },
            {
              "type": "metric", "x": 8, "y": 1, "width": 8, "height": 6,
              "properties": {
                "metrics": [["ResourceCleaner","PotentialSavings",{"stat":"Maximum","label":"Potential Savings ($)"}]],
                "title": "Potential Monthly Savings ($)", "view": "singleValue", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "metric", "x": 16, "y": 1, "width": 8, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","DeletedStacks",{"stat":"Sum","label":"Stacks"}],
                  ["ResourceCleaner","TerminatedInstances",{"stat":"Sum","label":"Instances"}],
                  ["ResourceCleaner","DeletedS3Buckets",{"stat":"Sum","label":"Buckets"}],
                  ["ResourceCleaner","DeletedVolumes",{"stat":"Sum","label":"Volumes"}],
                  ["ResourceCleaner","DeletedSnapshots",{"stat":"Sum","label":"Snapshots"}],
                  ["ResourceCleaner","ReleasedElasticIPs",{"stat":"Sum","label":"EIPs"}]
                ],
                "title": "Total Resources Deleted", "view": "singleValue", "region": "${AWS::Region}", "period": 2592000
              }
            },
            {
              "type": "text", "x": 0, "y": 7, "width": 24, "height": 1,
              "properties": {"markdown": "## Savings Breakdown"}
            },
            {
              "type": "metric", "x": 0, "y": 8, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","CostSavings","ResourceType","EC2Instance",{"stat":"Sum","label":"EC2 ($)"}],
                  ["ResourceCleaner","CostSavings","ResourceType","Volume",{"stat":"Sum","label":"Volumes ($)"}],
                  ["ResourceCleaner","CostSavings","ResourceType","Snapshot",{"stat":"Sum","label":"Snapshots ($)"}],
                  ["ResourceCleaner","CostSavings","ResourceType","ElasticIP",{"stat":"Sum","label":"EIPs ($)"}]
                ],
                "title": "Actual Savings by Type ($)", "view": "pie", "region": "${AWS::Region}", "period": 2592000
              }
            },
            {
              "type": "metric", "x": 12, "y": 8, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","PotentialSavings","ResourceType","EC2Instance",{"stat":"Maximum","label":"EC2 ($)"}],
                  ["ResourceCleaner","PotentialSavings","ResourceType","Volume",{"stat":"Maximum","label":"Volumes ($)"}],
                  ["ResourceCleaner","PotentialSavings","ResourceType","Snapshot",{"stat":"Maximum","label":"Snapshots ($)"}],
                  ["ResourceCleaner","PotentialSavings","ResourceType","ElasticIP",{"stat":"Maximum","label":"EIPs ($)"}]
                ],
                "title": "Potential Savings by Type ($)", "view": "pie", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "text", "x": 0, "y": 14, "width": 24, "height": 1,
              "properties": {"markdown": "## Savings Over Time"}
            },
            {
              "type": "metric", "x": 0, "y": 15, "width": 12, "height": 6,
              "properties": {
                "metrics": [["ResourceCleaner","TotalMonthlySavings",{"stat":"Sum","label":"Actual Savings ($)"}]],
                "title": "Actual Savings Trend (Daily)", "view": "timeSeries", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "metric", "x": 12, "y": 15, "width": 12, "height": 6,
              "properties": {
                "metrics": [["ResourceCleaner","PotentialSavings",{"stat":"Maximum","label":"Potential Savings ($)"}]],
                "title": "Potential Savings Trend (Daily)", "view": "timeSeries", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "text", "x": 0, "y": 21, "width": 24, "height": 1,
              "properties": {"markdown": "## Cleanup Activity"}
            },
            {
              "type": "metric", "x": 0, "y": 22, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","DeletedStacks",{"stat":"Sum","label":"Stacks"}],
                  ["ResourceCleaner","TerminatedInstances",{"stat":"Sum","label":"Instances"}],
                  ["ResourceCleaner","DeletedS3Buckets",{"stat":"Sum","label":"Buckets"}]
                ],
                "title": "Stacks, Instances & Buckets (Daily)", "view": "timeSeries", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "metric", "x": 12, "y": 22, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","DeletedVolumes",{"stat":"Sum","label":"Volumes"}],
                  ["ResourceCleaner","DeletedSnapshots",{"stat":"Sum","label":"Snapshots"}],
                  ["ResourceCleaner","ReleasedElasticIPs",{"stat":"Sum","label":"EIPs"}]
                ],
                "title": "Volumes, Snapshots & EIPs (Daily)", "view": "timeSeries", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "text", "x": 0, "y": 28, "width": 24, "height": 1,
              "properties": {"markdown": "## Protected vs Deleted"}
            },
            {
              "type": "metric", "x": 0, "y": 29, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","DeletedStacks",{"stat":"Sum","label":"Deleted"}],
                  ["ResourceCleaner","ProtectedStacks",{"stat":"Sum","label":"Protected"}]
                ],
                "title": "Stacks: Deleted vs Protected", "view": "bar", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "metric", "x": 12, "y": 29, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","TerminatedInstances",{"stat":"Sum","label":"Terminated"}],
                  ["ResourceCleaner","ProtectedInstances",{"stat":"Sum","label":"Protected"}]
                ],
                "title": "Instances: Terminated vs Protected", "view": "bar", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "text", "x": 0, "y": 35, "width": 24, "height": 1,
              "properties": {"markdown": "## Failures & Logs"}
            },
            {
              "type": "metric", "x": 0, "y": 36, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["ResourceCleaner","FailedDeletions","ResourceType","Stack",{"stat":"Sum","label":"Stacks"}],
                  ["ResourceCleaner","FailedDeletions","ResourceType","EC2Instance",{"stat":"Sum","label":"EC2"}],
                  ["ResourceCleaner","FailedDeletions","ResourceType","Volume",{"stat":"Sum","label":"Volumes"}],
                  ["ResourceCleaner","FailedDeletions","ResourceType","Snapshot",{"stat":"Sum","label":"Snapshots"}]
                ],
                "title": "Failed Deletions by Type", "view": "timeSeries", "region": "${AWS::Region}", "period": 86400
              }
            },
            {
              "type": "log", "x": 12, "y": 36, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${AWS::StackName}-CleanupFunction' | fields @timestamp, @message | filter @message like /Terminated|Deleted|Released|Error|Failed/ | sort @timestamp desc | limit 30",
                "region": "${AWS::Region}", "title": "Recent Activity", "view": "table"
              }
            }
          ]
        }

Outputs:
  CleanupFunctionArn:
    Description: Cleanup Lambda ARN
    Value: !GetAtt ResourceCleanupFunction.Arn
  SavingsScannerArn:
    Description: Potential Savings Scanner Lambda ARN
    Value: !GetAtt PotentialSavingsFunction.Arn
  SNSTopicArn:
    Description: SNS Topic ARN
    Value: !Ref CleanupNotificationTopic
  DashboardURL:
    Description: Cost Optimization Dashboard URL
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-Dashboard'
